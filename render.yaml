services:
  - type: web
    name: portfolio-hub-api
    env: python
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: pip install -U pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Render default Python (for new services) is 3.14.x as of 2026-02-11.
      # Pin to 3.13 so dependencies like pydantic-core install from wheels (no Rust build).
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: APP_SECRET_KEY
        generateValue: true
      - key: APP_DB_URL
        # IMPORTANT: Render free has an ephemeral filesystem.
        # Use a managed Postgres (e.g., Supabase) and set this in the Render UI.
        # Example:
        # postgresql+psycopg://USER:PASSWORD@HOST:5432/DBNAME?sslmode=require
        value: ""
      - key: APP_CORS_ORIGINS
        value: https://michael1gledhill.github.io
      - key: APP_UPLOADS_DIR
        value: ./backend/uploads
      - key: APP_CLOUDINARY_URL
        sync: false
      - key: APP_CLOUDINARY_FOLDER
        value: portfolio-hub
      - key: APP_BOOTSTRAP_ADMIN
        value: true
      - key: APP_DEFAULT_ADMIN_USERNAME
        value: admin
      - key: APP_DEFAULT_ADMIN_PASSWORD
        value: QWERTY
      - key: APP_RESET_BOOTSTRAP_ADMIN_PASSWORD
        value: true